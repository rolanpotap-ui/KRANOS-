<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRANOS- SYSTEM</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; color: #fff; }
        .main { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        
        /* Бинарный логотип К из 1 и 0 */
        .binary-logo {
            font-size: 10px; 
            line-height: 8px; 
            text-align: center; 
            white-space: pre;
            text-shadow: 2px 0 #f00, -2px 0 #0ff; 
            animation: glitch 0.1s infinite;
            user-select: none;
        }

        /* Надпись KRANOS огромным шрифтом */
        .title {
            font-size: 5rem; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: -5px; 
            margin-top: 20px; 
            text-shadow: 4px 4px #f00;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            50% { transform: translate(-2px, 1px); }
            100% { transform: translate(2px, -1px); }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="binary-logo">
1010101010101010101010101010
1
