<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRANOS_SYSTEM</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        
        /* Огромная буква К с глитчем */
        .big-k {
            font-size: 250px;
            font-weight: 900;
            color: #fff;
            position: relative;
            line-height: 1;
            text-shadow: 5px 0 #f00, -5px 0 #0ff;
            animation: k-glitch 0.2s infinite;
        }

        /* Бинарный код поверх буквы */
        .big-k::after {
            content: "10101100101";
            position: absolute;
            top: 0; left: 0;
            font-size: 20px;
            width: 100%;
            color: #000;
            overflow: hidden;
            opacity: 0.5;
        }

        /* Надпись KRANOS в стиле fsociety */
        .kranos-label {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -5px;
            margin-top: -20px;
            text-shadow: 4px 4px #f00;
            animation: k-glitch 0.3s infinite reverse;
        }

        @keyframes k-glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 2px) skew(5deg); }
            40% { transform: translate(4px, -2px) skew(-5deg); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="big-k">K</div>
    <div class="kranos-label">KRANOS</div>
</body>
</html>
